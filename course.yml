description: A project-driven follow-on to Python Apprentice. Students learn intermediate Python by reading, modifying, and building games with Pygame — covering physics, classes, vectors, sprites, collisions, and surfaces, then applying them in full-game projects like Flappy Bird, Space Invaders, and a Mars lander.
